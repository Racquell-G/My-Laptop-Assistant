<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Organizer — My Laptop Assistant</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="app-page">

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Home
      </a>

      <div class="sidebar-section">
        <div class="sidebar-label">Folder to scan</div>

        <div class="folder-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <input
            type="text"
            id="folderInput"
            class="folder-input"
            placeholder="Paste your folder path here"
            autocomplete="off"
          >
        </div>

        <div class="path-examples">
          <div class="path-label">Examples:</div>
          <code class="path-eg">C:\Users\Racquell\Downloads</code>
          <code class="path-eg">C:\Users\Racquell\Documents</code>
        </div>

        <button class="scan-btn" id="scanBtn" onclick="scanFolder()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Scan and organize
        </button>
      </div>

      <div class="sidebar-section" id="statsSection" style="display:none;">
        <div class="sidebar-label">Scan results</div>
        <div class="stats-grid" id="statsGrid"></div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <div class="chat-header">
        <h2>File organizer</h2>
        <span class="status-dot" id="statusDot"></span>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="chat-welcome">
          <div class="welcome-icon">🗂</div>
          <p>Paste a folder path on the left and click Scan.</p>
          <p class="welcome-sub">I'll analyze your files and suggest a clean organization structure. Then chat with me to adjust it.</p>
        </div>
      </div>

      <div class="chat-input-row">
        <input
          type="text"
          id="chatInput"
          class="chat-input"
          placeholder="Ask to adjust the plan, e.g. 'keep all my code in one folder'..."
          autocomplete="off"
        >
        <button class="send-btn" id="sendBtn" onclick="sendOrgChat()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>

  </div>

  <script src="/static/script.js"></script>
  <script src="/static/organizer.js"></script>
</body>
</html>
