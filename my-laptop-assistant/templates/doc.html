<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Assistant - My Laptop Assistant</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="app-page">

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Home
      </a>

      <div class="sidebar-section">
        <div class="sidebar-label">Document</div>

        <!-- Drop zone -->
        <div class="drop-zone" id="dropZone">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span id="dropLabel">Drop a file or click to browse</span>
          <input type="file" id="fileInput" accept=".pdf,.txt,.md" hidden>
        </div>

        <div class="file-info" id="fileInfo" style="display:none;">
          <div class="file-name" id="fileName"></div>
          <div class="file-meta" id="fileMeta"></div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Quick actions</div>
        <div class="quick-btns">
          <button class="quick-btn" data-q="Summarize this document in 3 clear sentences.">Summarize</button>
          <button class="quick-btn" data-q="What is the main idea or thesis of this document?">Main idea</button>
          <button class="quick-btn" data-q="List the 5 most important terms or concepts from this document with brief definitions.">Key terms</button>
          <button class="quick-btn" data-q="Explain the overall content of this document as if I have no prior knowledge of the subject.">Simplify</button>
          <button class="quick-btn" data-q="What are the most important conclusions or takeaways from this document?">Takeaways</button>
        </div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <div class="chat-header">
        <h2>Document assistant</h2>
        <span class="status-dot" id="statusDot"></span>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="chat-welcome">
          <div class="welcome-icon">📄</div>
          <p>Load a document on the left to get started.</p>
          <p class="welcome-sub">You can ask anything — summaries, key terms, specific sections, or plain-English explanations.</p>
        </div>
      </div>

      <div class="chat-input-row">
        <input
          type="text"
          id="questionInput"
          class="chat-input"
          placeholder="Ask a question about your document..."
          autocomplete="off"
        >
        <button class="send-btn" id="sendBtn" onclick="sendDocQuestion()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>

  </div>

  <script src="/static/script.js"></script>
  <script src="/static/doc.js"></script>
</body>
</html>
